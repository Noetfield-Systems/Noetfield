# SLO targets (hardened):
# - Platform validate: pass rate >95% on main, compile all packages OK
# - Ecosystem health check: zero breaking changes (drift = Kaizen)
# - Deploy smoke: API starts and responds in <10s

name: Platform CI (deploy-ready)

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "infrastructure/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/platform-deploy.yml"
  pull_request:
    paths:
      - "services/**"
      - "packages/**"
      - "infrastructure/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile and ecosystem health
        env:
          RUNTIME_EVENT_STORE: memory
          PYTHONPATH: .:packages/types:packages/config:services/events:services/ledger:services/graph:services/governance:services/signals:services/workflow:services/ai-runtime:services/inspectors:services/identity:services/copilot-governance:services/factories:services/trust-brief:services/legal-review:services/aml-trace
        run: |
          python -m compileall packages services scripts
          make ecosystem-health

      - name: Deploy smoke (ephemeral API)
        env:
          RUNTIME_EVENT_STORE: memory
          PYTHONPATH: .:packages/types:packages/config:services/events:services/ledger:services/graph:services/governance:services/signals:services/workflow:services/ai-runtime:services/inspectors:services/identity:services/copilot-governance:services/factories:services/trust-brief:services/legal-review:services/aml-trace
        run: |
          uvicorn noetfield_governance.api:app --host 127.0.0.1 --port 8001 --app-dir services/governance &
          sleep 4
          PLATFORM_HEALTH_BASE=http://127.0.0.1:8001 ./scripts/deploy_platform_smoke.sh
          kill %1 || true

      - name: Report health status
        if: always()
        run: |
          status="${{ job.status }}"
          echo "workflow_name=platform-deploy" >> $GITHUB_OUTPUT
          echo "slo_target=pass_rate>95%,compile_ok,zero_breaking_changes,startup<10s" >> $GITHUB_OUTPUT
          echo "health_status=${status}" >> $GITHUB_OUTPUT
          echo "Platform health: ${status}" | tee -a ${{ runner.temp }}/workflow-health.txt
        id: report

