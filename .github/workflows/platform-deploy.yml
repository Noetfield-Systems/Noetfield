name: Platform CI (deploy-ready)

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/**"
      - "infrastructure/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/platform-deploy.yml"
      - "!**/*.html"
      - "!assets/**"
      - "!sitemap.xml"
      - "!L0-law/**"
      - "!tests/unit/test_corporate_surface.py"
      - "!tests/unit/test_ai_motor_category.py"
      - "!tests/unit/test_social_preview_v2.py"
      - "!tests/unit/test_public_*.py"
      - "!tests/unit/test_investor_diligence_lane.py"
      - "!tests/unit/test_cf_pages_release.py"
      - "!tests/unit/test_nf_www_deploy_anti_stale_v2.py"
      - "!scripts/verify-static-www.sh"
      - "!scripts/check_noetfield_com_e2e.py"
      - "!scripts/verify-agent-scope.sh"
      - "!scripts/generate_sitemap.py"
      - "!scripts/audit_public_site_health.py"
      - "!scripts/build-public-www-artifact.py"
      - "!scripts/build-www-pages-dist.sh"
      - "!scripts/deploy-www-cloudflare.sh"
      - "!scripts/deploy-cf-www-proxy.sh"
      - "!scripts/nf_www_deploy_anti_stale_v2.py"
      - "!scripts/nf_post_deploy_verify.py"
      - "!scripts/noetfield_social_preview_v2.py"
      - "!scripts/verify-public-output-allowlist.py"
      - "!scripts/verify-www-**"
      - "!scripts/report_slo_health_v1.py"
      - "!scripts/sync_chat_greeting_asset.py"
      - "!scripts/verify_chat_greeting_coupling.py"
  pull_request:
    paths:
      - "services/**"
      - "packages/**"
      - "infrastructure/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - "!**/*.html"
      - "!assets/**"
      - "!sitemap.xml"
      - "!L0-law/**"
      - "!tests/unit/test_corporate_surface.py"
      - "!tests/unit/test_ai_motor_category.py"
      - "!tests/unit/test_social_preview_v2.py"
      - "!tests/unit/test_public_*.py"
      - "!tests/unit/test_investor_diligence_lane.py"
      - "!tests/unit/test_cf_pages_release.py"
      - "!tests/unit/test_nf_www_deploy_anti_stale_v2.py"
      - "!scripts/verify-static-www.sh"
      - "!scripts/check_noetfield_com_e2e.py"
      - "!scripts/verify-agent-scope.sh"
      - "!scripts/generate_sitemap.py"
      - "!scripts/audit_public_site_health.py"
      - "!scripts/build-public-www-artifact.py"
      - "!scripts/build-www-pages-dist.sh"
      - "!scripts/deploy-www-cloudflare.sh"
      - "!scripts/deploy-cf-www-proxy.sh"
      - "!scripts/nf_www_deploy_anti_stale_v2.py"
      - "!scripts/nf_post_deploy_verify.py"
      - "!scripts/noetfield_social_preview_v2.py"
      - "!scripts/verify-public-output-allowlist.py"
      - "!scripts/verify-www-**"
      - "!scripts/report_slo_health_v1.py"
      - "!scripts/sync_chat_greeting_asset.py"
      - "!scripts/verify_chat_greeting_coupling.py"
  workflow_dispatch:

concurrency:
  group: platform-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-deploy-smoke:
    name: platform-deploy-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Deploy smoke (ephemeral API)
        env:
          RUNTIME_EVENT_STORE: memory
          PYTHONPATH: .:packages/types:packages/config:services/events:services/ledger:services/graph:services/governance:services/signals:services/workflow:services/ai-runtime:services/inspectors:services/identity:services/copilot-governance:services/factories:services/trust-brief:services/legal-review:services/aml-trace
        run: python3 scripts/report_slo_health_v1.py --scope platform-deploy --budget-seconds 300 -- ./scripts/deploy_platform_smoke.sh

  # Production deploy: wire your host (Fly, ECS, VM) here when secrets are available.
  # deploy:
  #   needs: platform-deploy-smoke
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - run: echo "Add docker push / SSH deploy using repository secrets"
