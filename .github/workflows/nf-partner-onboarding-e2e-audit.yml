name: nf-partner-onboarding-e2e-audit

# Live, external, browser-driven check of the commission (Connector) and strategic
# (Co-partner / Partner / Investor) partner onboarding funnel. Findings feed the existing
# public.improvement_queue (nf-kaizen-nightly can auto-fix machine_safe items) and a
# committed JSON receipt (admin/partner-onboarding/ cockpit). Deliberately exits nonzero
# and pages Telegram on critical findings — unlike the silent-pass repo-health/security
# sweeps, this is testing a revenue path, not routine hygiene.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Partner-onboarding e2e audit
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NOETFIELD_SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_NOETFIELD_OPS_BOT_TOKEN: ${{ secrets.TELEGRAM_NOETFIELD_OPS_BOT_TOKEN }}
          TELEGRAM_OPS_CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
        run: |
          python3 scripts/report_slo_health_v1.py \
            --scope partner-onboarding-e2e-audit --budget-seconds 600 --json \
            -- python3 scripts/nf_partner_onboarding_e2e_audit_v1.py --json

      - name: Commit latest receipt (cockpit + api/admin/partner-onboarding-audit.js read this)
        if: always()
        run: |
          if git diff --quiet -- admin/partner-onboarding/latest.json; then
            echo "no receipt changes"
            exit 0
          fi
          git config user.name "nf-partner-onboarding-e2e-audit"
          git config user.email "nf-partner-onboarding-e2e-audit@users.noreply.github.com"
          git add admin/partner-onboarding/latest.json
          git commit -m "Partner-onboarding e2e audit: latest receipt"
          git push origin HEAD:main || echo "push skipped (branch protection — open PR manually)"
