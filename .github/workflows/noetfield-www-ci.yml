      - "governance/www-pages-routes.json"
      - "governance/www-public-artifact-v1.json"
      - "infra/cf-www-proxy/**"
      - "Makefile"
      - "noetfield-*.png"
      - "openapi.json"
      - "package-lock.json"
      - "package.json"
