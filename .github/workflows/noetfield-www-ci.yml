# SLO targets (hardened):
# - Website build and publish: pass rate >99% on main, latency <60s
# - Sitemap verification: 100% (health blocking)
# - Public health audit: zero critical issues on main (drift detected = Kaizen)

name: Noetfield WWW CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "assets/**"
      - "scripts/generate_sitemap.py"
      - "scripts/audit_public_site_health.py"
      - "sitemap.xml"
      - ".github/workflows/noetfield-www-ci.yml"
  pull_request:
    paths:
      - "**/*.html"
      - "assets/**"
      - "scripts/generate_sitemap.py"
      - "scripts/audit_public_site_health.py"
      - "sitemap.xml"

jobs:
  www-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify sitemap structure committed
        run: python3 scripts/verify_sitemap_committed.py

      - name: Public site health
        run: make site-health

      - name: Report health status
        if: always()
        run: |
          status="${{ job.status }}"
          echo "workflow_name=noetfield-www-ci" >> $GITHUB_OUTPUT
          echo "slo_target=pass_rate>99%,latency<60s,zero_critical_issues" >> $GITHUB_OUTPUT
          echo "health_status=${status}" >> $GITHUB_OUTPUT
          echo "Noetfield WWW health: ${status}" | tee -a ${{ runner.temp }}/workflow-health.txt
        id: report
