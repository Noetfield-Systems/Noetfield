      - "trust-ledger/**/*.pdf"
      - "trust-ledger/**/*.yaml"
      - ".github/workflows/noetfield-www-ci.yml"
      - ".github/workflows/noetfield-www-production.yml"

jobs:
  www-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          npm ci

      - name: Exact public artifact verification
        run: make verify-static-www

      - name: Protected-surface anti-stale gate
        run: |
          SHA="$(git rev-parse HEAD)"
          python3 scripts/nf_www_deploy_anti_stale_v2.py \
            --dist www-pages-dist \
            --offline \
            --expected-sha "$SHA" \
            --authorized-sha "$SHA"

      - name: Delivery release contracts
        run: python3 -m pytest -q tests/unit/test_corporate_surface.py tests/unit/test_ai_motor_category.py tests/unit/test_cf_pages_release.py tests/unit/test_nf_www_deploy_anti_stale_v2.py tests/unit/test_social_preview_v2.py

      - name: Guided Cockpit browser and authenticated proxy
        run: |
          npx playwright install --with-deps chromium
          npm run test:runways-cockpit

      - name: Public site health
        run: python3 scripts/report_slo_health_v1.py --scope public-site-ci --budget-seconds 180 -- make site-health
