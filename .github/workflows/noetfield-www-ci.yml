name: Noetfield WWW CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "assets/**"
      - "scripts/generate_sitemap.py"
      - "scripts/audit_public_site_health.py"
      - "scripts/nf_www_deploy_anti_stale_v1.py"
      - "config/noetfield-www-protected-surfaces.v1.json"
      - "config/change-manifests/**"
      - "sitemap.xml"
      - ".github/workflows/noetfield-www-ci.yml"
  pull_request:
    paths:
      - "**/*.html"
      - "assets/**"
      - "scripts/generate_sitemap.py"
      - "scripts/audit_public_site_health.py"
      - "scripts/nf_www_deploy_anti_stale_v1.py"
      - "config/noetfield-www-protected-surfaces.v1.json"
      - "config/change-manifests/**"
      - "sitemap.xml"
      - ".github/workflows/noetfield-www-ci.yml"

jobs:
  www-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: WWW anti-stale / protected-surface gate (non-skippable)
        run: |
          python3 scripts/nf_www_deploy_anti_stale_v1.py --self-test
          # Offline dist lock when a built tree is present; never treat CI green alone as promote proof.
          if [[ -f www-pages-dist/index.html ]]; then
            python3 scripts/nf_www_deploy_anti_stale_v1.py --mode dist --dist www-pages-dist --offline
          fi

      - name: Public site health
        run: python3 scripts/report_slo_health_v1.py --scope public-site-ci --budget-seconds 180 -- make site-health
