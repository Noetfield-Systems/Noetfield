# UPG-SUPABASE-001 — weekly activity to prevent Supabase free-tier auto-pause.
name: Supabase heartbeat

on:
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require Supabase secrets
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_ANON_KEY: ${{ secrets.NOETFIELD_SUPABASE_ANON_KEY }}
          NOETFIELD_SUPABASE_DATABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_DATABASE_URL }}
        run: |
          missing=0
          for key in NOETFIELD_SUPABASE_URL NOETFIELD_SUPABASE_ANON_KEY NOETFIELD_SUPABASE_DATABASE_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub secret ${key} — run scripts/sync_noetfield_supabase_github_secrets.sh on Mac"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Heartbeat SLO report
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_ANON_KEY: ${{ secrets.NOETFIELD_SUPABASE_ANON_KEY }}
          NOETFIELD_SUPABASE_DATABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_DATABASE_URL }}
        run: python3 scripts/report_slo_health_v1.py --scope supabase-heartbeat --budget-seconds 120 -- bash -lc 'python3 -m pip install --quiet asyncpg >/dev/null && python3 scripts/verify_supabase_heartbeat_v1.py'
