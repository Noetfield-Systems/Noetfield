# UPG-SUPABASE-001 — weekly activity to prevent Supabase free-tier auto-pause.
# SLO targets (hardened):
# - REST ping: 200 or 401 (auth rejection OK) = pass
# - SQL ping: heartbeat query returns 1 in <5s
# - Weekly success rate >95% (consecutive failures = Kaizen escalation)

name: Supabase heartbeat

on:
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: REST ping
        env:
          NOETFIELD_SUPABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_URL }}
          NOETFIELD_SUPABASE_ANON_KEY: ${{ secrets.NOETFIELD_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          test -n "$NOETFIELD_SUPABASE_URL"
          test -n "$NOETFIELD_SUPABASE_ANON_KEY"
          code="$(curl -sS -o /dev/null -w '%{http_code}' \
            "${NOETFIELD_SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${NOETFIELD_SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${NOETFIELD_SUPABASE_ANON_KEY}")"
          echo "REST HTTP ${code}"
          test "$code" = "200" -o "$code" = "401"

      - name: SQL ping
        env:
          NOETFIELD_SUPABASE_DATABASE_URL: ${{ secrets.NOETFIELD_SUPABASE_DATABASE_URL }}
        run: |
          set -euo pipefail
          test -n "$NOETFIELD_SUPABASE_DATABASE_URL"
          python3 -m pip install --quiet asyncpg
          python3 - <<'PY'
          import asyncio, os, asyncpg

          async def main() -> None:
              url = os.environ["NOETFIELD_SUPABASE_DATABASE_URL"].replace(
                  "postgresql+asyncpg://", "postgresql://"
              )
              conn = await asyncpg.connect(url)
              try:
                  assert await conn.fetchval("select 1") == 1
                  print("SQL heartbeat OK")
              finally:
                  await conn.close()

          asyncio.run(main())
          PY

      - name: Report health status
        if: always()
        run: |
          status="${{ job.status }}"
          echo "workflow_name=supabase-heartbeat" >> $GITHUB_OUTPUT
          echo "slo_target=rest_200_or_401,sql_response<5s,weekly_pass_rate>95%" >> $GITHUB_OUTPUT
          echo "health_status=${status}" >> $GITHUB_OUTPUT
          echo "Supabase heartbeat: ${status}" | tee -a ${{ runner.temp }}/workflow-health.txt
        id: report
