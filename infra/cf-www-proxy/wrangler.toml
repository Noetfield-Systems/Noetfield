name = "noetfield-www-proxy"
main = "src/worker.js"
compatibility_date = "2024-11-01"
account_id = "0d0b967b77e2e5535455d39ff3dae72c"

routes = [
  { pattern = "noetfield.com/*", zone_name = "noetfield.com" },
  { pattern = "www.noetfield.com/*", zone_name = "noetfield.com" },
  { pattern = "status.noetfield.com/*", zone_name = "noetfield.com" }
]

[vars]
# Production deploys override both values with an immutable Pages deployment URL
# and its exact git SHA. These fail-closed defaults must never serve public HTML.
ORIGIN = "https://release-required.invalid"
RELEASE_SHA = "UNSET"
APEX_HOST = "noetfield.com"
CANONICAL_HOST = "www.noetfield.com"
STATUS_HOST = "status.noetfield.com"
