# Governance Console API — public sandbox spine for www.noetfield.com/workspace proxy
# Deploy: bash scripts/deploy-gov-sandbox-railway.sh
# NEVER use repo-root railway.toml (platform-api) for this service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# Persistent SQLite — provision volume: railway volume add -m /data -s gov-sandbox-api
numReplicas = 1
