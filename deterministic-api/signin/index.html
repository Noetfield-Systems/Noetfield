<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Noetfield API</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="description" content="Sign in to the Noetfield Deterministic API workspace." />
  <link rel="canonical" href="https://www.noetfield.com/deterministic-api/signin/" />
  <link rel="icon" href="/noetfield-favicon-512.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/deterministic-api/workspace.css" />
</head>
<body class="dapi-auth">
  <header class="dapi-top">
    <a class="dapi-brand" href="/deterministic-api/">Noetfield <small>API</small></a>
  </header>

  <div class="dapi-auth-stage">
    <aside class="dapi-auth-rail" aria-hidden="true">
      <p class="dapi-auth-rail__mark">Noetfield</p>
      <h1>API workspace</h1>
      <p class="dapi-auth-rail__line">Credits. Keys. Top-up.</p>
    </aside>

    <main class="dapi-gate" aria-labelledby="gate-title">
      <div class="dapi-gate__inner">
        <p class="dapi-eyebrow">Deterministic API</p>
        <h1 id="gate-title">Welcome</h1>
        <p class="dapi-gate__lede">$10 trial. Keys stay in the workspace.</p>

        <div class="dapi-tabs" role="tablist" aria-label="Access mode">
          <button type="button" class="dapi-tab is-active" role="tab" id="tab-start" aria-controls="panel-start" aria-selected="true" data-tab="start">Start</button>
          <button type="button" class="dapi-tab" role="tab" id="tab-signin" aria-controls="panel-signin" aria-selected="false" data-tab="signin">Sign in</button>
        </div>

        <section class="dapi-panel-auth is-active" role="tabpanel" id="panel-start" aria-labelledby="tab-start">
          <form id="register-form" class="dapi-form">
            <label>Work email
              <input name="email" type="email" required autocomplete="email" placeholder="you@company.com" />
            </label>
            <button class="dapi-btn dapi-btn--primary" type="submit">Continue · $10 trial</button>
          </form>
        </section>

        <section class="dapi-panel-auth" role="tabpanel" id="panel-signin" aria-labelledby="tab-signin" hidden>
          <div class="dapi-oauth">
            <button type="button" class="dapi-btn dapi-btn--github" id="btn-github">Continue with GitHub</button>
            <button type="button" class="dapi-btn dapi-btn--google" id="btn-google">Continue with Google</button>
          </div>
          <details class="dapi-advanced">
            <summary>Use an API key</summary>
            <form id="key-form" class="dapi-form">
              <label>API key
                <input name="api_key" type="password" autocomplete="off" placeholder="sk-nf-…" required />
              </label>
              <button class="dapi-btn dapi-btn--primary" type="submit">Unlock</button>
            </form>
          </details>
        </section>

        <p class="dapi-status" id="status" role="status"></p>
        <p class="dapi-gate__foot"><a href="/deterministic-api/">← Product</a></p>
      </div>
    </main>
  </div>

  <script src="/deterministic-api/workspace.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.NFDapi && window.NFDapi.bootSignin) window.NFDapi.bootSignin();
    });
  </script>
</body>
</html>
